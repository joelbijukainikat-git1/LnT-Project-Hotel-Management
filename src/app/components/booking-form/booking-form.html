<div class="booking-container">
  <div class="booking-card">
    <div class="booking-header">
      <h2>Complete Your Booking</h2>
      <p class="booking-subtitle">Secure your room reservation</p>
    </div>

    <div *ngIf="successMessage" class="success-message">{{ successMessage }}</div>
    <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>

    <form [formGroup]="bookingForm" class="booking-form">
      <div class="form-group">
        <label for="hotel-name">Hotel Name</label>
        <input type="text" id="hotel-name" formControlName="hotelName" [disabled]="true">
      </div>

      <div class="form-group">
        <label for="room-type">Room Type</label>
        <select id="room-type" formControlName="roomType">
          <option *ngFor="let roomType of roomTypes" [value]="roomType">{{ roomType }}</option>
        </select>
      </div>

      <div class="form-group">
        <label for="price">Total Price</label>
        <input type="text" id="price" [value]="totalPrice | currency: 'INR': '₹': '1.0-0'" [disabled]="true">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="check-in">Check-in Date</label>
          <input type="date" id="check-in" formControlName="checkInDate">
          <span class="error-text" *ngIf="bookingForm.get('checkInDate')?.hasError('required') && bookingForm.get('checkInDate')?.touched">
            Check-in date is required
          </span>
        </div>
        <div class="form-group">
          <label for="check-out">Check-out Date</label>
          <input type="date" id="check-out" formControlName="checkOutDate">
          <span class="error-text" *ngIf="bookingForm.get('checkOutDate')?.hasError('required') && bookingForm.get('checkOutDate')?.touched">
            Check-out date is required
          </span>
        </div>
      </div>

      <div class="form-group">
        <label for="guests">Number of Guests</label>
        <select id="guests" formControlName="guests">
          <option *ngFor="let option of guestOptions" [value]="option">{{ option }} {{ option === 1 ? 'Guest' : 'Guests' }}</option>
        </select>
        <span class="error-text" *ngIf="bookingForm.get('guests')?.hasError('required') && bookingForm.get('guests')?.touched">
          Please select number of guests
        </span>
        <span class="error-text" *ngIf="(bookingForm.get('guests')?.hasError('min') || bookingForm.get('guests')?.hasError('max')) && bookingForm.get('guests')?.touched">
          Guests must be between 1 and 4
        </span>
      </div>

      <div class="form-group">
        <label for="special-requests">Special Requests</label>
        <textarea id="special-requests" formControlName="specialRequests" rows="3" placeholder="e.g., High floor, late check-in, etc."></textarea>
      </div>

      <div class="booking-summary">
        <p><strong>Total for your stay:</strong> <span class="total-price">{{ totalPrice | currency: 'INR': '₹': '1.0-0' }}</span></p>
      </div>

      <button 
        type="button" 
        class="btn-confirm" 
        (click)="onBookRoom()"
        [disabled]="isLoading">
        {{ isLoading ? 'Processing...' : 'Confirm Booking' }}
