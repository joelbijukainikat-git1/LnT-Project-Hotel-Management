<nav class="navbar">
  <div class="navbar-brand">🏨 Hotel Booking</div>
  <div class="navbar-links">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
    <a routerLink="/hotels" routerLinkActive="active">Hotels</a>
    <a routerLink="/rooms" routerLinkActive="active">Rooms</a>
    <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
    <a routerLink="/admin" routerLinkActive="active" *ngIf="isAdmin">Admin</a>
  </div>
  <div class="navbar-buttons">
    <button *ngIf="!isAuthenticated" class="btn-login" (click)="openLoginModal()">Login</button>
    <button *ngIf="isAuthenticated" class="btn-logout" (click)="logout()">Logout</button>
    <button *ngIf="!isAdmin" class="btn-admin-login" (click)="openAdminLoginModal()">Admin Login</button>
  </div>
</nav>

<!-- Login Modal -->
<div class="login-modal-overlay" *ngIf="showLoginModal" (click)="closeLoginModal()">
  <div class="login-modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>Welcome Back</h2>
      <button class="modal-close" (click)="closeLoginModal()">✕</button>
    </div>
    
    <div *ngIf="!showSuccessMessage" class="modal-content">
      <form (ngSubmit)="submitLogin()">
        <div class="form-group">
          <label for="username">Username</label>
          <input 
            type="text" 
            id="username" 
            [(ngModel)]="username" 
            name="username"
            placeholder="Enter your username"
            autocomplete="username"
          />
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            [(ngModel)]="password" 
            name="password"
            placeholder="Enter your password"
            autocomplete="current-password"
          />
        </div>
        
        <button type="submit" class="btn-submit">Login</button>
      </form>
    </div>
    
    <div *ngIf="showSuccessMessage" class="success-message">
      <div class="success-icon">✓</div>
      <p>{{ successMessage }}</p>
    </div>
  </div>
</div>

<!-- Admin Login Modal -->
<div class="login-modal-overlay" *ngIf="showAdminLoginModal" (click)="closeAdminLoginModal()">
  <div class="login-modal" (click)="$event.stopPropagation()">
    <div class="modal-header admin-header">
      <h2>🔐 Admin Access</h2>
      <button class="modal-close" (click)="closeAdminLoginModal()">✕</button>
    </div>
    
    <div *ngIf="!showAdminSuccessMessage" class="modal-content">
      <form (ngSubmit)="submitAdminLogin()">
        <div class="form-group">
          <label for="admin-password">Admin Password</label>
          <input 
            type="password" 
            id="admin-password" 
            [(ngModel)]="adminPassword" 
            name="adminPassword"
            placeholder="Enter admin password"
            autocomplete="current-password"
          />
          <small class="hint">Demo password: admin123</small>
        </div>
        
        <button type="submit" class="btn-submit admin-submit">Unlock Admin</button>
      </form>
    </div>
    
    <div *ngIf="showAdminSuccessMessage" class="success-message admin-success">
      <div class="success-icon">✓</div>
      <p>{{ adminSuccessMessage }}</p>
    </div>
  </div>
</div>
