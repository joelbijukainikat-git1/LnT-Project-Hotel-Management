<div class="rooms-section">
  <div class="rooms-header">
    <h2>Available Rooms</h2>
  </div>

  <div class="table-container">
    <table class="rooms-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Room Type</th>
          <th>Price</th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let room of rooms" [ngClass]="{'booked': !room.available}">
          <td class="room-id"><span class="id-badge">{{ room.id }}</span></td>
          <td class="room-type">{{ room.type }}</td>
          <td class="room-price">₹{{ room.price }}</td>
          <td class="room-status">
            <span *ngIf="room.available; else notAvailable" class="status-badge available">
              ✅ Available
            </span>
            <ng-template #notAvailable>
              <span class="status-badge booked">❌ Booked</span>
            </ng-template>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
